<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BeingInfinity</title>

    <style>

        body{
            background:#f5f5f5;
            font-family:Arial, sans-serif;
        }

        .container{
            width:900px;
            height:500px;
            margin:auto;
            padding:20px;
            background:white;
            border-radius:10px;
            box-shadow:0 0 10px gray;
            position:relative;
        }

        /* Gear icon */
        .gear{
            position:absolute;
            top:20px;
            left:20px;
            font-size:28px;
            cursor:pointer;
        }

        /* Online status */
        .status{
            position:absolute;
            top:25px;
            right:20px;
            font-size:18px;
        }

        .green-dot{
            color:green;
            font-size:18px;
        }

        h1{
            margin-top:90px;
            font-size:60px;
            font-family:Fritz;
        }

        .blue{
            color:#2196F3;
        }

        p{
            font-size:18px;
            color:#444;
        }

        input{
            width:100%;
            padding:18px 25px;
            border-radius:50px;
            border:1px solid #ccc;
            font-size:18px;
            outline:none;
            box-sizing:border-box;
        }

        input:focus{
            border-color:#2196F3;
        }

        .btn{
            margin-top:20px;
            padding:12px 28px;
            border:none;
            border-radius:25px;
            background:#2196F3;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        .btn:hover{
            background:#1976D2;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="gear">⚙️</div>

    <div class="status">
        <span class="green-dot">●</span> Online &nbsp; | &nbsp; 🕒
    </div>

    <h1><span class="blue">Being</span>Infinity</h1>

    <p>
        One million phrases. Four algorithms. Prefix Based Auto Suggest.
    </p>

    <input type="text" placeholder="🔍 Start typing to search phrases...">

    <br>

    <button class="btn">Suggestions</button>

</div>

</body>
</html>
