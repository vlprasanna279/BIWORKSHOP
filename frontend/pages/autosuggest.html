<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Tags Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 40px;
        }

        .container {
            width: 400px;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        input {
            width: 95%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        p {
            font-size: 18px;
        }

        span {
            color: blue;
            font-weight: bold;
        }

        .icons {
            font-size: 30px;
            text-align: center;
            margin-top: 20px;
        }

        .bullet {
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>⚙️ HTML Demo Page</h1>

    <input type="text" placeholder="🔍 Search here">

    <p>
        Welcome! <span>This is a span element.</span>
    </p>

    <p class="bullet">
        • Bullet Item 1<br>
        • Bullet Item 2<br>
        • Bullet Item 3
    </p>

    <div class="icons">
        ⚙️ &nbsp; 🔍 &nbsp; 🕒
    </div>

</div>

</body>
</html>
