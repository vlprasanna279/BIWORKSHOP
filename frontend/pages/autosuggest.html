<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 40px;
        }

        .container {
            width: 900px;
            height: 500px;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h1 {
            text-align: left;
            color: #333;
        }

        input {
            width: 95%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        p {
            font-size: 18px;
        }

        span {
            color: blue;
            font-weight: bold;
        }

        .icons {
            font-size: 30px;
            text-align: center;
            margin-top: 20px;
        }

        .bullet {
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icons">
        ⚙️ &nbsp; 🔍 &nbsp; 🕒
    </div>

    <h1>BeingInfinity</h1>

    <p>
        One million phrases.Four algorithms.Prefix Based Auto Suggest.</span>
    </p>

    <input type="text" placeholder="🔍 Start typing to search phrases...">



</div>

</body>
</html>
